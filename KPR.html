<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPR CAS Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#0d47a1,#1976d2);
        }

        .login-container{
            background:#fff;
            width:380px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            width:300px;
            margin-bottom:20px;
        }

        h2{
            color:#0d47a1;
            margin-bottom:20px;
        }

        .input-group{
            margin-bottom:15px;
            text-align:left;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#333;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:15px;
        }

        .input-group input:focus{
            border-color:#1976d2;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#1976d2;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#0d47a1;
        }

        .footer{
            margin-top:15px;
            font-size:13px;
            color:#666;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <!-- Save the uploaded logo as logo.png -->
        <img src="logo.png" alt="KPR CAS Logo" class="logo">

        <h2>Student Login</h2>

        <form>
            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Enter Username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer">
            KPR College of Arts Science and Research<br>
            Coimbatore
        </div>

    </div>

</body>
</html>
