<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPR Login</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:100%;
    max-width:350px;
}

h2{
    text-align:center;
    color:#1f3c88;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#1f3c88;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16306e;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    color:#666;
}
</style>
</head>
<body>

<div class="login-container">

    <!-- Replace with your uploaded image -->
    <div class="logo">
        <img src="kpr_logo.png" alt="KPR College Logo">
    </div>

    <h2>Student Login</h2>

    <form action="login.php" method="POST">

        <div class="input-group">
            <label>Login ID</label>
            <input type="text" name="loginid" placeholder="Enter Login ID" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        KPR College of Arts Science and Research
    </div>

</div>

</body>
</html>
